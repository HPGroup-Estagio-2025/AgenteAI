<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Dashboard de Notícias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="dashboard-page">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#2563EB"/>
          <path d="M10 28V14h4l6 9 6-9h4v14h-4V20l-6 8-6-8v8H10Z" fill="white"/>
        </svg>
        <span>Dashboard de Notícias</span>
      </div>
      <div class="header-actions">
        <div class="refresh-info">
          <span id="lastRefresh">—</span>
          <button id="refreshBtn" class="btn btn-ghost" title="Atualizar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
        <div class="user-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
          </svg>
          <span id="usernameDisplay">admin</span>
        </div>
        <button id="logoutBtn" class="btn btn-ghost btn-danger">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
          </svg>
          Sair
        </button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card stat-pending">
        <div class="stat-value" id="countPending">0</div>
        <div class="stat-label">Pendentes</div>
      </div>
      <div class="stat-card stat-published">
        <div class="stat-value" id="countPublished">0</div>
        <div class="stat-label">Publicadas</div>
      </div>
      <div class="stat-card stat-rejected">
        <div class="stat-value" id="countRejected">0</div>
        <div class="stat-label">Rejeitadas</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filter-tabs" role="tablist">
        <button class="filter-tab active" data-status="" role="tab">Todas</button>
        <button class="filter-tab" data-status="pending" role="tab">Pendentes</button>
        <button class="filter-tab" data-status="published" role="tab">Publicadas</button>
        <button class="filter-tab" data-status="rejected" role="tab">Rejeitadas</button>
      </div>
      <div class="search-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="search" id="searchInput" placeholder="Pesquisar notícias..." maxlength="100" />
      </div>
    </div>

    <!-- Sector Filter -->
    <div class="sector-bar" id="sectorBar">
      <button class="sector-tab active" data-sector="">Todos os Setores</button>
      <button class="sector-tab" data-sector="maritimo">Marítimo <span class="sector-count" id="countSector-maritimo">0</span></button>
      <button class="sector-tab" data-sector="defesa-militar">Defesa Militar <span class="sector-count" id="countSector-defesa-militar">0</span></button>
      <button class="sector-tab" data-sector="aeroespacial">Aeroespacial <span class="sector-count" id="countSector-aeroespacial">0</span></button>
      <button class="sector-tab" data-sector="ferroviario">Ferroviário <span class="sector-count" id="countSector-ferroviario">0</span></button>
    </div>

    <!-- News list -->
    <div id="newsList" class="news-list">
      <div class="empty-state" id="emptyState">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>
        </svg>
        <p>Sem notícias para mostrar</p>
        <span>As notícias do n8n aparecerão aqui automaticamente</span>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none">
      <button id="prevPage" class="btn btn-ghost">← Anterior</button>
      <span id="pageInfo">Página 1 de 1</span>
      <button id="nextPage" class="btn btn-ghost">Próxima →</button>
    </div>

  </main>

  <!-- Modal de confirmação -->
  <div id="confirmModal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Confirmar ação</h2>
      </div>
      <div class="modal-body">
        <p id="modalMessage"></p>
        <div id="rejectReasonGroup" style="display:none" class="form-group mt-2">
          <label for="rejectReason">Motivo da rejeição (opcional)</label>
          <textarea id="rejectReason" placeholder="Indica o motivo..." maxlength="300" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modalCancel" class="btn btn-ghost">Cancelar</button>
        <button id="modalConfirm" class="btn btn-primary">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite" style="display:none"></div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
